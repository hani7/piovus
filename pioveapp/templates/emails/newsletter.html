<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f9f9f9; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: #000000; padding: 30px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-weight: 300; letter-spacing: 2px; font-size: 24px; }
        .content { padding: 40px 30px; color: #333333; line-height: 1.6; font-size: 16px; }
        .footer { background: #f4f4f4; padding: 20px; text-align: center; font-size: 12px; color: #888888; border-top: 1px solid #eeeeee; }
        .button { display: inline-block; padding: 12px 24px; background-color: #000000; color: #ffffff; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PIOVÉ COSMETICS</h1>
        </div>
        <div class="content">
            {{ message|safe }}
        </div>
        <div class="footer">
            © 2026 Piové Cosmetics. Tous droits réservés.<br>
            Vous recevez cet email car vous êtes inscrit à notre newsletter ou vous avez passé commande sur notre site.
        </div>
    </div>
</body>
</html>
